<!DOCTYPE html>
<html lang="en">

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Match Scouting Form</title>
    <link rel="stylesheet" href="css/stylesheet_scouting.css">
    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/footer.css">
    <link rel="stylesheet" href="css/globalStyle.css">
    <script src="js/scouting.js"></script>
    <script src="js/header.js"></script>
</head>

<body>
    <div id="header">
        <a href="index.html" id="logo">
            <img src="images/9062_logo.jpg">
        </a>
        <div id="flexnav">
            <a href="orginal.html">Orginal Intention</a>
            <a href="Robot.html">Robot</a>
            <a href="Member.html">Member</a>
            <a href="Sponsors.html">Sponsors</a>
            <a href="Location.html">Location</a>
        </div>
        <p>"Try More.<br>Try Smarter"</p>
    </div>
    <div class="container">
        <h1>Match Scouting Form</h1>

        <form id="scoutForm">
            <div class="section">
                <div class="grid">
                    <div>
                        <label for="matchNumber">Match #</label>
                        <input type="number" id="matchNumber" name="matchNumber" />
                    </div>
                    <div>
                        <label for="matchType">Match Type</label>
                        <select id="matchType" name="matchType">
                            <option value="qualification">Qualification</option>
                            <option value="playoff">Playoff</option>
                            <option value="practice">Practice</option>
                        </select>
                    </div>
                    <div>
                        <label for="allianceColor">Alliance Colour</label>
                        <select id="allianceColor" name="allianceColor">
                            <option value="red">Red</option>
                            <option value="blue">Blue</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="section">
                <div class="grid">
                    <div>
                        <label for="predictWin">Predicted Winner</label>
                        <select id="predictWin" name="predictWin">
                            <option value="them">Them</option>
                            <option value="opponent">Opponent</option>
                        </select>
                    </div>

                    <div>
                        <label for="actualWin">Actual Winner</label>
                        <select id="actualWin" name="actualWin">
                            <option value="them">Them</option>
                            <option value="opponent">Opponent</option>
                        </select>
                    </div>

                    <div>
                        <label for="rankingPoints">Ranking Points</label>
                        <input type="number" id="rankingPoints" name="rankingPoints" min="0" max="6" />
                    </div>

                    <div>
                        <label for="opponents">Opponents</label>
                        <input type="text" id="opponents" name="opponents" placeholder="e.g. 1114, 2056, 5406" />
                    </div>

                    <div>
                        <label for="Number">Team #</label>
                        <input type="number" id="Number" name="teams[0][number]" />
                    </div>

                    <div>
                        <label for="Bump">Bump / Trench / Both</label>
                        <select id="Bump" name="teams[0][path]">
                            <option value="">Select</option>
                            <option value="bump">Bump</option>
                            <option value="trench">Trench</option>
                            <option value="both">Both</option>
                        </select>
                    </div>

                    <div>
                        <label for="Capabilities">Capabilities</label>
                        <div class="checkbox-group">
                            <label><input type="checkbox" name="teams[0][capabilities][]" value="preload" />
                                Preload</label>
                            <label><input type="checkbox" name="teams[0][capabilities][]" value="cycles" />
                                Cycles</label>
                            <label><input type="checkbox" name="teams[0][capabilities][]" value="intake" />
                                Intake</label>
                            <label><input type="checkbox" name="teams[0][capabilities][]" value="feed" /> Feed</label>
                            <label><input type="checkbox" name="teams[0][capabilities][]" value="defended" />
                                Defended</label>
                            <label><input type="checkbox" name="teams[0][capabilities][]" value="climb" /> Climb</label>
                        </div>
                    </div>

                    <div>
                        <label for="Disabled">Disabled?</label>
                        <select id="Disabled" name="teams[0][disabled]">
                            <option value="no">No</option>
                            <option value="yes">Yes</option>
                        </select>
                    </div>

                    <div class="section">
                        <label for="details">Details</label>
                        <textarea id="details" name="details"></textarea>
                    </div>

                    <button type="submit">Submit</button>
                </div>


            </div>
        </form>
    </div>
    <div id="footer">
        <div class="column1">
            <h3>Social:</h3>

            <a href="https://www.youtube.com/@CriticalCircuits" target="_blank">
                <img src="images/youtube_image.png" alt="YouTube Logo" class="icon"> Youtube
            </a>

            <a href="https://www.thebluealliance.com/team/9062" target="_blank">
                <img src="images/Screenshot 2026-03-11 144539.png" alt="TheBlueAlliance Logo" class="icon">Blue Alliance
            </a>

            <a href="https://www.instagram.com/9062photographer" target="_blank">
                <img src="images/instagram_icon.png" alt="Instagram Logo" class="icon"> Instagram
            </a>

        </div>

        <div class="column1">
            <h3>Connect:</h3>
            <p><a href="javascript:void(0)" onclick="openLogin()">Login</a></p>
            <p><a href="scouting.html">Scouting</a></p>
        </div>

        <div class="column1">
            <h3>Contact:</h3>
            <p><a href="mailto:chenghongkiu6@gmail.com">Email</a></p>
            <p>Support</p>
            <p><a href="feedback.html">Feedback</a></p>
        </div>
    </div>

    <div id="loginModal" class="modal">
        <div class="modal-content">
            <span class="close-button">&times;</span>
            <h2>Login</h2>
            <form action="php/login.php" method="POST">
                <input type="text" name="username" placeholder="Email" required>
                <input type="password" name="password" placeholder="Password" required>
                <button type="submit">Sign In</button>
            </form>
        </div>
    </div>

<script>
    document.addEventListener('DOMContentLoaded', () => {
    const modal = document.getElementById("loginModal");
    const closeBtn = document.querySelector(".close-button");
    window.openLogin = function() {
        modal.style.display = "flex";
    }
    closeBtn.onclick = function() {
        modal.style.display = "none";
    }
    window.onclick = function(event) {
        if (event.target == modal) {
            modal.style.display = "none";
        }
    }
});
</script>
</body>

</html>
